<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .weather-info { display: flex; justify-content: space-between; }
        @media (max-width: 600px) {
            .weather-info { flexDirection: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Dashboard</h1>
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button onclick="getWeather()">Get Weather</button>
        <div id="currentWeather"></div>
        <div id="forecast"></div>
    </div>

    <script>
        const apiKey = 'YOUR_API_KEY'; // Replace with your OpenWeatherMap API key

        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
            const data = await response.json();
            displayCurrentWeather(data);
            getForecast(city);
        }

        function displayCurrentWeather(data) {
            const weatherDiv = document.getElementById('currentWeather');
            weatherDiv.innerHTML = `<h2>${data.name}</h2>`+
                                    `<p>Weather: ${data.weather[0].description} 🌧️</p>`+
                                    `<p>Temperature: ${data.main.temp}°C</p>`+
                                    `<p>Humidity: ${data.main.humidity}%</p>`+
                                    `<p>Wind Speed: ${data.wind.speed} m/s</p>`;
        }

        async function getForecast(city) {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`);
            const data = await response.json();
            displayForecast(data);
        }

        function displayForecast(data) {
            const forecastDiv = document.getElementById('forecast');
            forecastDiv.innerHTML = '<h3>5-Day Forecast</h3>';
            data.list.forEach((item, index) => {
                if (index % 8 === 0) { // Get only one forecast per day
                    forecastDiv.innerHTML += `<p>${item.dt_txt}: ${item.main.temp}°C, ${item.weather[0].description} ☔</p>`;
                }
            });
        }
    </script>
</body>
</html>
